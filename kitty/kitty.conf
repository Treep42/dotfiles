# vim:fileencoding=utf-8:foldmethod=marker

# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
# ALWAYS SET BACKGROUND OPACITY
background_opacity  0.85
background_blur  1

#: Text cursor customization {{{

cursor_shape block

cursor_shape_unfocused hollow

cursor_blink_interval -1

cursor_stop_blinking_after 15.0

#: }}}

#: Scrollback {{{

scrollback_lines 5000

#: }}}

#: Mouse {{{

#: hide mouse after specified seconds of the mouse not being used.
#: Set to zero to disable mouse cursor hiding.
#: Set to a negative value to hide immediately when typing text
mouse_hide_wait -3.0

#: style for highlighting urls on mouse-over
url_style curly
#: one of: none, straight, double, curly, dotted, dashed.

#: The program to open clicked URLs
open_url_with default
#: The special value default will first look for any open_actions URL
#: handlers and then fallback to xdg_open
#: open_actions: <https://sw.kovidgoyal.net/kitty/open_actions/>

select_by_word_characters @-./_~?&=%+#
#: Characters considered part of a word when double clicking

#: }}}

#: Performance tuning {{{

# repaint_delay 10

#: Delay between screen updates (in milliseconds). Decreasing it,
#: increases frames-per-second (FPS) at the cost of more CPU usage.
#: The default value yields ~100 FPS which is more than sufficient for
#: most uses. Note that to actually achieve 100 FPS, you have to
#: either set sync_to_monitor to no or use a monitor with a high
#: refresh rate. Also, to minimize latency when there is pending input
#: to be processed, this option is ignored.

# input_delay 3

#: Delay before input from the program running in the terminal is
#: processed (in milliseconds). Note that decreasing it will increase
#: responsiveness, but also increase CPU usage and might cause flicker
#: in full screen programs that redraw the entire screen on each loop,
#: because kitty is so fast that partial screen updates will be drawn.
#: This setting is ignored when the input buffer is almost full.

# sync_to_monitor yes

#: Sync screen updates to the refresh rate of the monitor. This
#: prevents screen tearing
#: <https://en.wikipedia.org/wiki/Screen_tearing> when scrolling.
#: However, it limits the rendering speed to the refresh rate of your
#: monitor. With a very high speed mouse/high keyboard repeat rate,
#: you may notice some slight input latency. If so, set this to no.

#: }}}

#: Terminal bell {{{

enable_audio_bell no

#: The audio bell. Useful to disable it in environments that require
#: silence.

# visual_bell_duration 0.0

#: The visual bell duration (in seconds). Flash the screen when a bell
#: occurs for the specified number of seconds. Set to zero to disable.
#: The flash is animated, fading in and out over the specified
#: duration. The easing function used for the fading can be
#: controlled. For example, 2.0 linear will casuse the flash to fade
#: in and out linearly. The default if unspecified is to use ease-in-
#: out which fades slowly at the start, middle and end. You can
#: specify different easing functions for the fade-in and fade-out
#: parts, like this: 2.0 ease-in linear. kitty supports all the CSS
#: easing functions <https://developer.mozilla.org/en-
#: US/docs/Web/CSS/easing-function>.

# visual_bell_color none

#: The color used by visual bell. Set to none will fall back to
#: selection background color. If you feel that the visual bell is too
#: bright, you can set it to a darker color.

# window_alert_on_bell yes

#: Request window attention on bell. Makes the dock icon bounce on
#: macOS or the taskbar flash on Linux.

# bell_on_tab "🔔 "
bell_on_tab " "

#: Some text or a Unicode symbol to show on the tab if a window in the
#: tab that does not have focus has a bell. If you want to use leading
#: or trailing spaces, surround the text with quotes. See
#: tab_title_template for how this is rendered.

#: For backwards compatibility, values of yes, y and true are
#: converted to the default bell symbol and no, n, false and none are
#: converted to the empty string.

# command_on_bell none

#: Program to run when a bell occurs. The environment variable
#: KITTY_CHILD_CMDLINE can be used to get the program running in the
#: window in which the bell occurred.

# bell_path none

#: Path to a sound file to play as the bell sound. If set to none, the
#: system default bell sound is used. Must be in a format supported by
#: the operating systems sound API, such as WAV or OGA on Linux
#: (libcanberra) or AIFF, MP3 or WAV on macOS (NSSound).

# linux_bell_theme __custom

#: The XDG Sound Theme kitty will use to play the bell sound. Defaults
#: to the custom theme name specified in the XDG Sound theme
#: specification <https://specifications.freedesktop.org/sound-theme-
#: spec/latest/sound_lookup.html>, falling back to the default
#: freedesktop theme if it does not exist. To change your sound theme
#: desktop wide, create
#: :file:~/.local/share/sounds/__custom/index.theme` with the
#: contents:

#:     [Sound Theme]

#:     Inherits=name-of-the-sound-theme-you-want-to-use

#: Replace name-of-the-sound-theme-you-want-to-use with the actual
#: theme name. Now all compliant applications should use sounds from
#: this theme.

#: }}}

#: Window layout {{{

remember_window_size  yes
initial_window_width  640
initial_window_height 400
#: use suffix of "c" on the width/height values to have them interpreted
#: as number of cells instead of pixels.

#: enabled layouts:
enabled_layouts tall:bias=50;full_size=1;mirrored=false,splits:split_axis=auto,stack,grid
# disabled layouts: horizontal, vertical, fat
#: <https://sw.kovidgoyal.net/kitty/overview/#layouts>.

#: step size to use when resizing windows with the shortcut start_resizing_window
window_resize_step_cells 2
window_resize_step_lines 2

window_border_width 0.5pt
#: collapse borders
draw_minimal_borders yes

#: window margin (blank area outside the border)
window_margin_width 0
#: single value: all four sides. Two values: vertical & horizontal
#: Three values: top, horizontal and bottom
#: Four values: top, right, bottom and left.
single_window_margin_width -1
#: Negative value: use value of window_margin_width instead

#: window padding (blank area between text and window border)
window_padding_width 0
single_window_padding_width -1
#: Negative value: use value of window_padding_width instead

#: Fade the text in inactive windows by the specified amount (a number
#: between zero and one, with zero being fully faded).
inactive_text_alpha 1.0

#: Hide the window decorations (title-bar and window borders)
hide_window_decorations no

#: The list of characters for visual window selection
visual_window_select_characters 1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ
#: value should be a series of unique numbers or alphabets, case
#: insensitive, from the set 0-9A-Z\-=[];',./\\`
#
confirm_os_window_close -1 count-background

#: }}}

#: Tab bar {{{

#: The edge to show the tab bar on, top or bottom.
tab_bar_edge bottom

#: The margin to the left and right of the tab bar (in pts).
tab_bar_margin_width 0.0

#: The margin above and below the tab bar (in pts). The first number
#: is the margin between the edge of the OS Window and the tab bar.
#: The second number is the margin between the tab bar and the
#: contents of the current tab.
tab_bar_margin_height 0.0 0.0

#: The tab bar style, can be one of:
tab_bar_style powerline
#: slant
#:     Tabs look like the tabs in a physical file.
#: separator
#:     Tabs are separated by a configurable separator. (See also
#:     tab_separator)
#: powerline
#:     Tabs are shown as a continuous line with "fancy" separators.
#:     (See also tab_powerline_style)

#: The horizontal alignment of the tab bar, can be one of: left, center, right.
tab_bar_align left

#: The minimum number of tabs that must exist before the tab bar is shown
tab_bar_min_tabs 2

#: The algorithm to use when switching to a tab when the current tab
#: is closed.
tab_switch_strategy previous

#: The separator between tabs in the tab bar when using separator as the tab_bar_style.
tab_separator " "

#: The powerline separator style between tabs in the tab bar when
#: using powerline as the tab_bar_style, can be one of: angled, slanted, round.
tab_powerline_style round

#: Some text or a Unicode symbol to show on the tab if a window in the
#: tab that does not have focus has some activity
tab_activity_symbol " "

#: The maximum number of cells that can be used to render the text in
#: a tab. A value of zero means that no limit is applied.
tab_title_max_length 0

#: A template to render the tab title
#tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{tab.last_focused_progress_percent}{index}: {title}"
# tab_title_template        "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{' ' if layout_name == 'stack' else ' '}{index}: {f'{title[:6]}…{title[-6:]}' if title.rindex(title[-1]) + 1 > 25 else title}"
# active_tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{' ' if layout_name == 'stack' else ' '}{index}: {f'{title[:6]}…{title[-6:]}' if title.rindex(title[-1]) + 1 > 25 else title}"
tab_title_template        "{bell_symbol}{activity_symbol}{f'{title[:6]}…{title[-6:]}' if title.rindex(title[-1]) + 1 > 25 else title}{' ' if layout_name == 'stack' else ''}"
active_tab_title_template "{bell_symbol}{activity_symbol}{f'{title[:6]}…{title[-6:]}' if title.rindex(title[-1]) + 1 > 25 else title}{' ' if layout_name == 'stack' else ''}"
# active_tab_title_template none

active_tab_font_style normal
inactive_tab_font_style normal

#: Tab bar colors and styles.

# tab_bar_margin_color none

#: Color for the tab bar margin area. Defaults to using the terminal
#: background color for margins above and below the tab bar. For side
#: margins the default color is chosen to match the background color
#: of the neighboring tab.

#: }}}

#: Advanced {{{

allow_remote_control yes

#: Allow other programs to control kitty. If you turn this on, other
#: programs can control all aspects of kitty, including sending text
#: to kitty windows, opening new windows, closing windows, reading the
#: content of windows, etc. Note that this even works over SSH
#: connections. The default setting of no prevents any form of remote
#: control. The meaning of the various values are:

notify_on_cmd_finish invisible 30 notify focus next

#: Show a desktop notification when a long-running command finishes
#: (needs shell_integration). The possible values are:

#: }}}

#: Keyboard shortcuts {{{

#: functional keys: <https://sw.kovidgoyal.net/kitty/keyboard-protocol/#functional>.
#: mapping: <https://sw.kovidgoyal.net/kitty/mapping/>
#: actions: <https://sw.kovidgoyal.net/kitty/actions/>.

kitty_mod ctrl+shift

clear_all_shortcuts yes

#: Clipboard {{{

#: Copy to clipboard
map kitty_mod+c copy_to_clipboard
map ctrl+c copy_or_interrupt

#: Paste from clipboard
map kitty_mod+v paste_from_clipboard

#: Pass selection to program
map kitty_mod+o pass_selection_to_program

#: }}}

#: Scrolling {{{

#: Scroll line up
map kitty_mod+up    scroll_line_up
map kitty_mod+k     scroll_line_up

#: Scroll line down
map kitty_mod+down    scroll_line_down
map kitty_mod+j       scroll_line_down

#: Scroll page up
map kitty_mod+page_up scroll_page_up

#: Scroll page down
map kitty_mod+page_down scroll_page_down

#: Scroll to top
map kitty_mod+home scroll_home

#: Scroll to bottom
map kitty_mod+end scroll_end

#: Scroll to previous shell prompt
map kitty_mod+y scroll_to_prompt -1

#: Scroll to next shell prompt
map kitty_mod+x scroll_to_prompt 1

#: Browse scrollback buffer in pager
map kitty_mod+i show_scrollback

#: Browse output of the last shell command in pager
map kitty_mod+g show_last_command_output

#: }}}

#: Window management {{{

#: New window
# map kitty_mod+enter new_window
map kitty_mod+enter launch --location=vsplit
#:: New window with cwd of current
map ctrl+alt+enter new_window_with_cwd
#: New OS window with cwd of current
map ctrl+alt+n new_os_window_with_cwd
#: new window in vertical split
map kitty_mod+alt+enter launch --location=vsplit
#: close
map kitty_mod+w close_window

#: resize
map kitty_mod+r start_resizing_window

#: move windows
map kitty_mod+f move_window_forward
map kitty_mod+b move_window_backward
map kitty_mod+# move_window_to_top

#: move focus between windows
map kitty_mod+right next_window
map kitty_mod+left previous_window
#: jump to window number X
# map kitty_mod+1 first_window
# map kitty_mod+2 second_window
# map kitty_mod+3 third_window
# map kitty_mod+4 fourth_window
# map kitty_mod+5 fifth_window
# map kitty_mod+6 sixth_window
# map kitty_mod+7 seventh_window
# map kitty_mod+8 eighth_window
# map kitty_mod+9 ninth_window
# map kitty_mod+0 tenth_window

#: visually swap window with another
map kitty_mod+f8 swap_with_window
#: visually select and focus window
map kitty_mod+f9 focus_visible_window

#: SWITCH FOCUS USING ARROWS/HJKL
map ctrl+h neighboring_window left
map ctrl+left neighboring_window left

map ctrl+j neighboring_window down
map ctrl+down neighboring_window down

map ctrl+k neighboring_window up
map ctrl+up neighboring_window up

map ctrl+l neighboring_window right
map ctrl+right neighboring_window right

#: }}}

#: Tab management {{{

#: New tab
map kitty_mod+t new_tab

#: go to next/previous tab like in browsers
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab

#: Close tab
map kitty_mod+q close_tab

#: Move tab forward
map kitty_mod+a move_tab_forward

#: Move tab backward
map kitty_mod+d move_tab_backward

#: Set tab title
# map kitty_mod+alt+a set_tab_title

#: go to tab number X
map ctrl+alt+1 goto_tab 1
map ctrl+alt+2 goto_tab 2
map ctrl+alt+3 goto_tab 3
map ctrl+alt+4 goto_tab 4
map ctrl+alt+5 goto_tab 5
map ctrl+alt+6 goto_tab 6
map ctrl+alt+7 goto_tab 7
map ctrl+alt+8 goto_tab 8
map ctrl+alt+9 goto_tab 9
map ctrl+alt+0 goto_tab 10

#: }}}

#: Layout management {{{
#: my layout keymaps all use ctrl+alt prefixes

#: Next layout
map ctrl+alt+o next_layout

#: "zoom" on active window
map ctrl+alt+z toggle_layout stack

#: toggle mirroring of the tall and fat layouts
map ctrl+alt+m layout_action mirror toggle

#: rotate the current split between horizontal and vertical
map ctrl+alt+r layout_action rotate

#: MOVE ACTIVE WINDOW USING ARROWS/HJKL
map ctrl+alt+h move_window left
map ctrl+alt+left move_window left

map ctrl+alt+j move_window down
map ctrl+alt+down move_window down

map ctrl+alt+k move_window up
map ctrl+alt+up move_window up

map ctrl+alt+l move_window right
map ctrl+alt+right move_window right

#: }}}

#: Font sizes {{{

#: You can change the font size for all top-level kitty OS windows at
#: a time or only the current one.

#: Increase font size
map kitty_mod+f4 change_font_size current +2.0
map kitty_mod+alt+f4 change_font_size all +2.0

#: Decrease font size
map kitty_mod+f3 change_font_size current -2.0
map kitty_mod+alt+f3 change_font_size all -2.0

#: Reset font size
map kitty_mod+backspace change_font_size all 0

#: }}}

#: Select and act on visible text {{{

#: Use the hints kitten to select text and act on it
#: <https://sw.kovidgoyal.net/kitty/kittens/hints/>.

#: Open URL
map kitty_mod+e open_url_with_hints
#::  Open a currently visible URL using the keyboard. The program used
#::  to open the URL is specified in open_url_with.

#: Insert selected path
map kitty_mod+p>f kitten hints --type path --program -
#::  Select a path/filename and insert it into the terminal. Useful,
#::  for instance to run git commands on a filename output from a
#::  previous git command.

#: Open selected path
map kitty_mod+p>shift+f kitten hints --type path
#::  Select a path/filename and open it with the default open program.

#: Insert selected line
map kitty_mod+p>l kitten hints --type line --program -
#::  Select a line of text and insert it into the terminal. Useful for
#::  the output of things like: `ls -1`.

#: Insert selected word
map kitty_mod+p>w kitten hints --type word --program -
#::  Select words and insert into terminal.

#: Insert selected hash
map kitty_mod+p>h kitten hints --type hash --program -
#::  Select something that looks like a hash and insert it into the
#::  terminal. Useful with git, which uses SHA1 hashes to identify
#::  commits.

#: Open the selected file at the selected line
map kitty_mod+p>n kitten hints --type linenum
#::  Select something that looks like filename:linenum and open it in
#::  your default editor at the specified line number.

#: Open the selected hyperlink
map kitty_mod+p>y kitten hints --type hyperlink
#::  Select a hyperlink (i.e. a URL that has been marked as such by
#::  the terminal program, for example, by `ls --hyperlink=auto`).

#: }}}

#: Miscellaneous {{{

#: Show keymaps
map kitty_mod+f1 kitten keymap.py

#: Unicode input
map kitty_mod+u kitten unicode_input

#: Edit config file
map kitty_mod+f2 edit_config_file

#: Open the kitty command shell
map kitty_mod+escape kitty_shell tab
#::  Open the kitty shell in a new window / tab / overlay / os_window
#::  to control kitty using commands.

#: MODIFY BACKGROUND OPACITY
map kitty_mod+b>m set_background_opacity +0.1
map kitty_mod+b>l set_background_opacity -0.1
#: fully opaque
map kitty_mod+b>1 set_background_opacity 1
#: reset
map kitty_mod+b>d set_background_opacity default

#: Clear screen
map kitty_mod+m clear_terminal to_cursor_scroll active

#: Reload kitty.conf
map kitty_mod+f5 load_config_file

#: Debug kitty configuration
map kitty_mod+f6 debug_config
#::  Show details about exactly what configuration kitty is running
#::  with and its host environment. Useful for debugging issues.
#: }}}
#: }}}


# BEGIN_KITTY_FONTS
#font_family      family="Mononoki Nerd Font"
font_family      family="Maple Mono"
font_size        12.0
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
